services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smsbridge
      POSTGRES_PASSWORD: smsbridge
      POSTGRES_DB: smsbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smsbridge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
    env_file: .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./apps/backend
    env_file: .env.example
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
    command: celery -A app.jobs.celery_app:celery_app worker -B --loglevel=info

  frontend:
    build:
      context: ./apps/frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
  
  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DESIGN: pepa-linha

volumes:
  postgres_data:
